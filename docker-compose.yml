services:
  db:
    image: postgres:15-alpine
    container_name: npm-stats-db
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=traefik_stats
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - proxy
    labels:
      - com.lighthouse.enable=true

  redis:
    image: redis:7-alpine
    container_name: npm-stats-redis
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
    volumes:
      - /etc/localtime:/etc/localtime:ro
    networks:
      - proxy
    labels:
      - com.lighthouse.enable=true

  worker:
    image: ghcr.io/scruzzimattia-blip/npm-worker:latest
    container_name: npm-stats-worker
    restart: unless-stopped
    depends_on:
      - db
      - redis
    entrypoint: ["python", "worker.py"]
    environment:
      TZ: Europe/Zurich
      DATABASE_URL: postgresql://user:password@db:5432/traefik_stats
      RETENTION_DAYS: 30
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      CROWDSEC_LAPI_KEY: ${CROWDSEC_LAPI_KEY}
      CROWDSEC_MACHINE_PASSWORD: ${CROWDSEC_MACHINE_PASSWORD}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
      LOG_FILE: /app/logs/access.log
      ACCESS_LOG_FORMAT: nginx
      CITY_DB: /app/geoip/city.mmdb
      ASN_DB: /app/geoip/asn.mmdb
      ATTACK_PATTERNS: ${ATTACK_PATTERNS:-}
      IGNORED_IPS: ${IGNORED_IPS:-92.106.189.142,85.4.41.226}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      # Nginx Proxy Manager: mount the access log you use (e.g. fallback_access.log or proxy-host-*_access.log)
      - /home/mattia/proxy/npm/data/logs/fallback_access.log:/app/logs/access.log:ro
      - /home/mattia/proxy/data/crowdsec/data/GeoLite2-City.mmdb:/app/geoip/city.mmdb:ro
      - /home/mattia/proxy/data/crowdsec/data/GeoLite2-ASN.mmdb:/app/geoip/asn.mmdb:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy

  npm-stats:
    image: ghcr.io/scruzzimattia-blip/npm-app:latest
    container_name: npm-stats-app
    restart: unless-stopped
    depends_on:
      - db
      - redis
    entrypoint: ["streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    environment:
      TZ: Europe/Zurich
      DATABASE_URL: postgresql://user:password@db:5432/traefik_stats
      CROWDSEC_LAPI_URL: http://crowdsec:8080
      CROWDSEC_LAPI_KEY: ${CROWDSEC_LAPI_KEY}
      CROWDSEC_MACHINE_PASSWORD: ${CROWDSEC_MACHINE_PASSWORD}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      REDIS_URL: redis://redis:6379/0
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/mattia/proxy/data/crowdsec/data/GeoLite2-City.mmdb:/app/geoip/city.mmdb:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy
    ports:
      - "8501:8501"

  crowdsec:
    image: crowdsecurity/crowdsec:latest
    container_name: npm-stats-crowdsec
    restart: unless-stopped
    environment:
      TZ: Europe/Zurich
      COLLECTIONS: "crowdsecurity/nginx crowdsecurity/http-cve"
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/mattia/proxy/npm/data/logs/fallback_access.log:/var/log/nginx/access.log:ro
      - ./crowdsec_data:/var/lib/crowdsec/data
      - ./crowdsec_config:/etc/crowdsec
    networks:
      - proxy
    ports:
      - "8082:8080"
    labels:
      - com.lighthouse.enable=true

  error-page:
    image: nginx:alpine
    container_name: npm-error-page
    restart: unless-stopped
    environment:
      - TZ=Europe/Zurich
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./static:/usr/share/nginx/html:ro
    networks:
      - proxy
    labels:
      - com.lighthouse.enable=true

  bouncer:
    image: debian:bookworm-slim
    container_name: npm-crowdsec-bouncer
    restart: unless-stopped
    command: ["/bouncer"]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /home/mattia/proxy/npm/bouncer:/bouncer:ro
    environment:
      - TZ=Europe/Zurich
      - CROWDSEC_LAPI_URL=http://crowdsec:8080
      - CROWDSEC_LAPI_KEY=${CROWDSEC_LAPI_KEY}
      - REDIRECT_URL=https://blocked.scruzzi.com
      - DATABASE_URL=postgresql://user:password@db:5432/traefik_stats
    networks:
      - proxy
    ports:
      - "8503:8080"

networks:
  proxy:
    external: true
